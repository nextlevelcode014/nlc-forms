services:
  api:
    build: ./backend
    container_name: nlc-forms-api
    ports:
      - "8000:8000"
    environment:
      # Separe múltiplos domínios por vírgula
      # Ex: https://nextlevelcode.pro,https://www.nextlevelcode.pro
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:9080,http://127.0.0.1:9080,http://localhost:8080,http://127.0.0.1:8080"
      DB_PATH: "/data/forms.db"

      # Chave usada para gerar tokens e acessar o painel de atendimento.
      # TROQUE este valor — qualquer um com essa chave acessa dados de clientes.
      ADMIN_KEY: "teste"

      # Validade padrão dos links de formulário, em horas
      TOKEN_TTL_HOURS: "48"

      # ── SMTP — notificação por e-mail quando chega uma nova triagem ──
      # Deixe SMTP_HOST vazio para desativar notificações (sem quebrar nada).
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      NOTIFY_TO: ""

      # URL base de onde os formulários/painel estão servidos (frontend)
      # Usada para montar o link que vai no e-mail de notificação.
      PAINEL_BASE_URL: "http://localhost:9080"
    volumes:
      - forms_data:/data
    restart: unless-stopped

volumes:
  forms_data:

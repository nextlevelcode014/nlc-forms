services:
  api:
    build: ./backend
    container_name: nlc-forms-api
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DB_PATH: ${DB_PATH}
      ADMIN_KEY: ${ADMIN_KEY}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      NOTIFY_TO: ${NOTIFY_TO}
      PAINEL_BASE_URL: ${PAINEL_BASE_URL}
    volumes:
      - forms_data:/data
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: sync
          path: ./backend/pdf_relatorio.py
          target: /app/pdf_relatorio.py
        - action: sync
          path: ./backend/seed_dados.py
          target: /app/seed_dados.py
        - action: rebuild
          path: ./backend/pyproject.toml

volumes:
  forms_data:

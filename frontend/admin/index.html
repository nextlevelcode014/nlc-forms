<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextLevelCode — Admin</title>
  <link rel="icon" type="image/png" href="favicon-16x16.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    rgba(249, 115, 22, 0.2);
      --primary:   #f97316;
      --accent:    #2d8fff;
      --text:      #e5e7eb;
      --muted:     #9ca3af;
      --radius:    6px;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 2.5rem 2.5rem 3rem;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 2.5rem;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      border: 1px solid rgba(249, 115, 22, 0.3);
      background: rgba(249, 115, 22, 0.08);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .page-intro {
      margin-bottom: 2rem;
    }

    .page-intro h1 {
      font-family: var(--font-mono);
      font-size: 27px;
      font-weight: 600;
      color: var(--primary);
    }

    .page-intro p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 15px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }

    .card:hover {
      border-color: var(--primary);
      background: rgba(249, 115, 22, 0.04);
      transform: translateY(-1px);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(249, 115, 22, 0.08);
      border-radius: var(--radius);
    }

    .card-body h2 {
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 600;
    }

    .card-body p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 0.2rem;
    }

    .card-arrow {
      margin-left: auto;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 20px;
      transition: color 0.15s;
    }

    .card:hover .card-arrow {
      color: var(--primary);
    }

    .hint {
      margin-top: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <main class="container">

    <header>
      <img class="logo-mark" src="logo.png" alt="NextLevelCode" />
      <span class="logo-text">NextLevelCode</span>
      <span class="badge">Admin</span>
    </header>

    <div class="page-intro">
      <h1>admin</h1>
      <p>Ferramentas internas de atendimento.</p>
    </div>

    <div class="cards">

      <a class="card" href="painel-atendimento.html">
        <div class="card-icon">🛠</div>
        <div class="card-body">
          <h2>painel de atendimento</h2>
          <p>Buscar triagem, executar atendimento, gerar orçamento e PDF</p>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="admin-gerar-token.html">
        <div class="card-icon">🔑</div>
        <div class="card-body">
          <h2>gerar token</h2>
          <p>Criar link de acesso único para envio ao cliente</p>
        </div>
        <div class="card-arrow">→</div>
      </a>

    </div>

    <p class="hint">acesso restrito à tailnet</p>

  </main>

</body>
</html>
